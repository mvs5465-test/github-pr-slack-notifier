name: PR Review Bot

on:
  workflow_dispatch:
    inputs:
      pull_number:
        description: Pull request number to review
        required: true
        type: number
      review_action:
        description: Review action to submit
        required: true
        default: APPROVE
        type: choice
        options:
          - APPROVE
          - REQUEST_CHANGES
          - COMMENT
      review_body:
        description: Optional review body
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      pull_number:
        required: true
        type: number
      review_action:
        required: true
        type: string
      review_body:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Submit pull request review
        uses: actions/github-script@v7
        env:
          INPUT_PULL_NUMBER: ${{ inputs.pull_number }}
          INPUT_REVIEW_ACTION: ${{ inputs.review_action }}
          INPUT_REVIEW_BODY: ${{ inputs.review_body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pullNumber = Number(process.env.INPUT_PULL_NUMBER || "0");
            const reviewAction = (process.env.INPUT_REVIEW_ACTION || "APPROVE").trim().toUpperCase();
            const providedBody = (process.env.INPUT_REVIEW_BODY || "").trim();

            if (!pullNumber || Number.isNaN(pullNumber)) {
              core.setFailed("pull_number must be a valid number");
              return;
            }

            const allowed = new Set(["APPROVE", "REQUEST_CHANGES", "COMMENT"]);
            if (!allowed.has(reviewAction)) {
              core.setFailed(`review_action must be one of: ${Array.from(allowed).join(", ")}`);
              return;
            }

            const defaultBodies = {
              APPROVE: "Automated review approval from PR Review Bot workflow.",
              REQUEST_CHANGES: "Automated review requesting changes from PR Review Bot workflow.",
              COMMENT: "Automated review comment from PR Review Bot workflow.",
            };

            const body = providedBody || defaultBodies[reviewAction];

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              event: reviewAction,
              body,
            });

            core.info(`Submitted ${reviewAction} review to PR #${pullNumber}`);

