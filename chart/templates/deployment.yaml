apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "github-pr-slack-notifier.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "github-pr-slack-notifier.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "github-pr-slack-notifier.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "github-pr-slack-notifier.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- with .Values.podAnnotations }}
      annotations:
{{ toYaml . | indent 8 }}
      {{- end }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: GITHUB_APP_ID
              value: {{ .Values.env.GITHUB_APP_ID | quote }}
            - name: GITHUB_INSTALLATION_IDS
              value: {{ .Values.env.GITHUB_INSTALLATION_IDS | quote }}
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretEnv.name | quote }}
                  key: {{ .Values.secretEnv.githubAppPrivateKeyKey | quote }}
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretEnv.name | quote }}
                  key: {{ .Values.secretEnv.slackBotTokenKey | quote }}
            - name: POLL_INTERVAL_SECONDS
              value: {{ .Values.env.POLL_INTERVAL_SECONDS | quote }}
            - name: DRY_RUN
              value: {{ .Values.env.DRY_RUN | quote }}
            - name: ROUTES_JSON
              value: {{ .Values.env.ROUTES_JSON | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: JSON_LOGS
              value: {{ .Values.env.JSON_LOGS | quote }}
            - name: METRICS_ENABLED
              value: {{ .Values.env.METRICS_ENABLED | quote }}
            - name: METRICS_PORT
              value: {{ .Values.env.METRICS_PORT | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.env.OTEL_SERVICE_NAME | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
          ports:
            - name: metrics
              containerPort: {{ .Values.env.METRICS_PORT | int }}
              protocol: TCP
          resources:
{{ toYaml .Values.resources | indent 12 }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
