replicaCount: 1

image:
  repository: ghcr.io/mvs5465-test/github-pr-slack-notifier
  tag: "main"
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

namespace:
  create: true
  name: "github-pr-slack-notifier"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  GITHUB_APP_ID: ""
  GITHUB_INSTALLATION_IDS: ""
  POLL_INTERVAL_SECONDS: "30"
  DEEP_RECONCILE_INTERVAL_SECONDS: "30"
  SWEEP_RECONCILE_INTERVAL_SECONDS: "600"
  ENABLE_SWEEP_RECONCILE: "false"
  RATE_LIMIT_BACKOFF_SECONDS: "60"
  RATE_LIMIT_BACKOFF_MAX_SECONDS: "900"
  ERROR_RETRY_SECONDS: "10"
  ENABLE_HISTORICAL_CLOSED_PRS: "false"
  DRY_RUN: "true"
  ROUTES_JSON: "[]"
  LOG_LEVEL: "INFO"
  JSON_LOGS: "true"
  METRICS_ENABLED: "true"
  METRICS_PORT: "9000"
  OTEL_SERVICE_NAME: "github-pr-slack-notifier"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""

secretEnv:
  name: "github-pr-slack-notifier-secret"
  githubAppPrivateKeyKey: "GITHUB_APP_PRIVATE_KEY"
  slackBotTokenKey: "SLACK_BOT_TOKEN"

imagePullSecrets: []

service:
  enabled: true
  type: ClusterIP
  port: 9000
  annotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9000"
  prometheus.io/path: "/metrics"

nodeSelector: {}
tolerations: []
affinity: {}
